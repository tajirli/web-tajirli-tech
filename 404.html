<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Tajirli Tech</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">404</p>
      <h1>We could not find that page.</h1>
      <p class="lead">
        You will be redirected to the homepage in a moment. If you prefer, choose one of the quick links below.
      </p>
      <div class="hero-actions">
        <a class="button button-primary" href="index.html">Back to Homepage</a>
        <a class="button button-secondary" href="docs/index.html">Open Main Docs</a>
        <a class="button button-secondary" href="docs/app-tajirli/index.html">Open App Docs</a>
      </div>
    </section>

    <section class="panel" aria-label="Helpful links">
      <h3>Helpful Links</h3>
      <div class="meta-row">
        <a class="chip" href="docs/architecture.html">Architecture</a>
        <a class="chip" href="docs/runbook.html">Runbook</a>
        <a class="chip" href="docs/progress.html">Progress Tracker</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var parts = window.location.pathname.split('/').filter(Boolean);
      var repoSegment = parts.length > 0 ? '/' + parts[0] : '';
      var target = repoSegment + '/';

      setTimeout(function () {
        window.location.replace(target);
      }, 1400);
    })();
  </script>
</body>
</html>
